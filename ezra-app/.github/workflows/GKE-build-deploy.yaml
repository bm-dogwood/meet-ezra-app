name: GKE Build and Deploy Services

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        type: choice
        options:
          - main
          - develop
          - dev-env-deploy
      
      folder:
        description: "Folder to build (backend, meetezraportal)"
        required: true
        type: choice
        options:
          - backend
          - meetezraportal
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  PROJECT_ID: ezrabot-481216
  GKE_CLUSTER: ezrabot-prod-gke
  GKE_REGION: us-east1
  GCR_REGION: us-east1
  ARTIFACT_REGISTRY: ezrabot-repo

jobs:
  build-and-deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.GCR_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get commit SHA from selected branch
        id: commit
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          echo "📋 Checking out branch: $BRANCH"
          
          # Get the commit SHA from the selected branch
          COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_SHA="${COMMIT_SHA:0:7}"
          
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "📍 Using commit: $SHORT_SHA from branch: $BRANCH"

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA="${{ steps.commit.outputs.short_sha }}"
          ENV="${{ github.event.inputs.environment }}"
          
          # Create tag: hash-environment (e.g., abc1234-dev or abc1234-prod)
          IMAGE_TAG="${SHORT_SHA}-${ENV}"
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Generated image tag: $IMAGE_TAG"

      - name: Determine image and context
        id: svc
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          ENV="${{ github.event.inputs.environment }}"

          case "$FOLDER" in
            backend)
              IMAGE_NAME="ezra-backend"
              BUILD_CONTEXT="backend"
              DOCKERFILE="backend/Dockerfile"
              DEPLOYMENT="backend"
              ;;
            meetezraportal)
              IMAGE_NAME="meetezraportal"
              BUILD_CONTEXT="frontend/meetezraportal"
              DOCKERFILE="frontend/meetezraportal/Dockerfile"
              DEPLOYMENT="meetezraportal"
              ;;
            *)
              echo "❌ Unsupported folder: $FOLDER"
              exit 1
              ;;
          esac

          # Set k8s path and namespace based on environment
          if [ "$ENV" = "dev" ]; then
            K8S_PATH="k8s-dev/$FOLDER"
            NAMESPACE="dev-ezrabot"
          else
            K8S_PATH="k8s-prod/$FOLDER"
            NAMESPACE="ezrabot"
          fi

          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          IMAGE_URI="${{ env.GCR_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${IMAGE_NAME}:${IMAGE_TAG}"

          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "build_context=$BUILD_CONTEXT" >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "k8s_path=$K8S_PATH" >> $GITHUB_OUTPUT
          echo "deployment=$DEPLOYMENT" >> $GITHUB_OUTPUT
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
          echo "environment=$ENV" >> $GITHUB_OUTPUT

          # Set API URL based on environment
          if [ "$ENV" = "dev" ]; then
            API_URL="https://dev-api-meetezra.hachiai.com"
          else
            API_URL="https://api.meetezra.bot"
          fi
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (Backend)
        if: ${{ github.event.inputs.folder == 'backend' }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.svc.outputs.build_context }}
          file: ./${{ steps.svc.outputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.svc.outputs.image_uri }}
            ${{ env.GCR_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/ezra-backend:latest

      - name: Build and push Docker image (Frontend)
        if: ${{ github.event.inputs.folder == 'meetezraportal' }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.svc.outputs.build_context }}
          file: ./${{ steps.svc.outputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.svc.outputs.image_uri }}
            ${{ env.GCR_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/meetezraportal:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.svc.outputs.api_url }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to GKE using manifests
        run: |
          NAMESPACE="${{ steps.svc.outputs.namespace }}"
          ENV="${{ steps.svc.outputs.environment }}"
          K8S_PATH="${{ steps.svc.outputs.k8s_path }}"
          IMAGE_URI="${{ steps.svc.outputs.image_uri }}"
          DEPLOYMENT="${{ steps.svc.outputs.deployment }}"
          BRANCH="${{ steps.commit.outputs.branch }}"
          COMMIT_SHA="${{ steps.commit.outputs.short_sha }}"

          echo "🚀 Deploying to $ENV environment (namespace: $NAMESPACE)"
          echo "📦 Branch: $BRANCH | Commit: $COMMIT_SHA"

          # Ensure namespace exists
          echo "📦 Creating namespace $NAMESPACE if it doesn't exist..."
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # Apply all YAML manifests in the service folder (ingress, certificate, deployment, etc.)
          echo "📦 Applying all manifests from $K8S_PATH"
          kubectl apply -f $K8S_PATH/

          # Update deployment image to the newly built image
          echo "📝 Updating image in deployment $DEPLOYMENT to: $IMAGE_URI"
          kubectl set image deployment/$DEPLOYMENT $DEPLOYMENT=$IMAGE_URI -n $NAMESPACE

          # Update all CronJob images to match (backend only)
          if [ "$DEPLOYMENT" = "backend" ]; then
            echo "📝 Updating CronJob images to: $IMAGE_URI"
            for CJ in $(kubectl get cronjobs -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl set image cronjob/$CJ send-reports=$IMAGE_URI -n $NAMESPACE 2>/dev/null && \
                echo "  ✓ Updated CronJob $CJ" || echo "  ⏭ Skipped CronJob $CJ"
            done
          fi

          # Force restart to pull new image
          echo "🔄 Restarting deployment to pull new image..."
          kubectl rollout restart deployment/$DEPLOYMENT -n $NAMESPACE

          echo "⏳ Waiting for rollout..."
          kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=300s

          echo "✅ Deployment completed successfully to $ENV environment!"

      - name: Deployment Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 DEPLOYMENT SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 Environment:        ${{ steps.svc.outputs.environment }}"
          echo "📦 Service Name:      ${{ steps.svc.outputs.deployment }}"
          echo "🐳 Image Used:        ${{ steps.svc.outputs.image_uri }}"
          echo "🏗️  Cluster Name:      ${{ env.GKE_CLUSTER }}"
          echo "📁 Project Name:      ${{ env.PROJECT_ID }}"
          echo "🌿 Branch:            ${{ steps.commit.outputs.branch }}"
          echo "🔖 Commit SHA:         ${{ steps.commit.outputs.short_sha }}"
          echo "📂 Namespace:         ${{ steps.svc.outputs.namespace }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
