apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ezrabot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: ezra-backend-sa
      containers:
      - name: backend
        image: us-east1-docker.pkg.dev/ezrabot-481216/ezrabot-repo/ezra-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DEBUG
          value: "False"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: SECRET_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: INGESTION_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: INGESTION_API_KEY
        - name: EMAIL_HOST
          value: "smtp.gmail.com"
        - name: EMAIL_PORT
          value: "587"
        - name: EMAIL_HOST_USER
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: EMAIL_HOST_USER
        - name: EMAIL_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: EMAIL_HOST_PASSWORD
        - name: DEFAULT_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: EMAIL_HOST_USER
        - name: ADMIN_URL
          value: "https://api.meetezra.bot/admin"
        - name: FRONTEND_URL
          value: "https://meetezra.bot/login"
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: TWILIO_ACCOUNT_SID
              optional: true
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: TWILIO_AUTH_TOKEN
              optional: true
        - name: TWILIO_FROM_NUMBER
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: TWILIO_FROM_NUMBER
              optional: true
        - name: TWILIO_MESSAGING_SERVICE_SID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: TWILIO_MESSAGING_SERVICE_SID
              optional: true
        - name: EZRA_ENV
          value: "prod"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ezrabot
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: backend
