apiVersion: v1
kind: ServiceAccount
metadata:
  name: ezra-backend-sa
  namespace: dev-ezrabot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cronjob-manager
  namespace: dev-ezrabot
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-cronjob-manager
  namespace: dev-ezrabot
subjects:
  - kind: ServiceAccount
    name: ezra-backend-sa
    namespace: dev-ezrabot
roleRef:
  kind: Role
  name: cronjob-manager
  apiGroup: rbac.authorization.k8s.io
