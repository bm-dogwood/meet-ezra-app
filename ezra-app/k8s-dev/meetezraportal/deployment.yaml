apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetezraportal
  namespace: dev-ezrabot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meetezraportal
  template:
    metadata:
      labels:
        app: meetezraportal
    spec:
      containers:
      - name: meetezraportal
        image: us-east1-docker.pkg.dev/ezrabot-481216/ezrabot-repo/meetezraportal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5177
          name: http
        env:
        - name: PORT
          value: "5177"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: NEXT_PUBLIC_FIREBASE_API_KEY
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_API_KEY
        - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        - name: NEXT_PUBLIC_FIREBASE_APP_ID
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_APP_ID
        - name: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
        - name: NEXT_PUBLIC_KONG_URL
          valueFrom:
            secretKeyRef:
              name: meetezraportal-secrets
              key: NEXT_PUBLIC_KONG_URL
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 5177
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5177
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: meetezraportal
  namespace: dev-ezrabot
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5177
    protocol: TCP
    name: http
  selector:
    app: meetezraportal

