apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meetezraportal-ingress
  namespace: dev-ezrabot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dev-meetezra.hachiai.com
    - www.dev-meetezra.hachiai.com
    secretName: meetezraportal-tls
  rules:
  - host: www.dev-meetezra.hachiai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meetezraportal
            port:
              number: 80
  - host: dev-meetezra.hachiai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meetezraportal
            port:
              number: 80

